<!DOCTYPE html>
<html>
<head>
    <title>Hora Pães</title>
    <style>
        body{
            font-family: Arial;
            background:#f5e6d3;
            padding:40px;
        }

        h1{
            color:#6b3e26;
        }

        .card{
            background:white;
            padding:20px;
            margin:10px 0;
            border-radius:10px;
        }

        a{
            background:#6b3e26;
            color:white;
            padding:10px;
            text-decoration:none;
            border-radius:5px;
        }
    </style>
</head>
<body>

<h1>Padaria Hora Pães</h1>

<a href="/produtos/">Ver Produtos</a>

{% for produto in produtos %}
<div class="card">
    <h2>{{ produto.nome }}</h2>
    <p>Preço: R$ {{ produto.preco }}</p>
    <p>Estoque: {{ produto.quantidade_estoque }}</p>
</div>
{% endfor %}

</body>
</html>
