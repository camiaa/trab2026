<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Produtos</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5e6d3;
}

nav{
    background:#6b3e26;
    padding:15px;
}

nav a{
    color:white;
    text-decoration:none;
    margin-right:15px;
}

.container{
    padding:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
}

.btn{
    display:inline-block;
    margin-top:10px;
    background:#6b3e26;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    text-decoration:none;
}

h1{
    color:#6b3e26;
}
</style>
</head>

<body>

<nav>
    <a href="/">Início</a>
    <a href="/produtos-site/">Produtos</a>
    <a href="{% url 'diagrama' %}">Diagrama</a>
</nav>

<div class="container">

<h1>Nossos Produtos</h1>

<div class="grid">

{% for produto in produtos %}

<div class="card">

<h2>{{ produto.nome }}</h2>

<p>{{ produto.descricao }}</p>

<strong>R$ {{ produto.preco }}</strong>

<p>Quantidade: {{ produto.quantidade_estoque }}</p>

<br>

<a class="btn" href="/vender/{{ produto.id }}/">
 Vender 1 unidade
</a>

<br><br>

<a class="btn" href="/editar/{{ produto.id }}/">
Editar
</a>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
